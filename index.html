<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duit Notif Pro - v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-slate-900 text-white min-h-screen p-4">

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Sidebar Perangkat -->
        <div class="bg-slate-800 rounded-2xl p-5 border border-slate-700 flex flex-col h-[600px]">
            <h2 class="text-xl font-bold mb-4 flex items-center justify-between">
                <span>📱 Devices</span>
                <span id="myDeviceBadge" class="text-[10px] bg-emerald-500 px-2 py-1 rounded">Offline</span>
            </h2>
            <div id="deviceList" class="flex-1 overflow-y-auto space-y-2">
                <p class="text-slate-500 text-sm italic">Menunggu pendaftaran...</p>
            </div>
            <button onclick="setupFCM()" class="mt-4 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">
                🚀 DAFTARKAN HP INI
            </button>
        </div>

        <!-- Chat Area -->
        <div class="md:col-span-2 bg-slate-800 rounded-2xl p-6 border border-slate-700 flex flex-col h-[600px]">
            <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-4">
                <div>
                    <h3 id="targetTitle" class="font-bold text-lg text-emerald-400">Global Chat</h3>
                    <p id="targetStatus" class="text-xs text-slate-500">Pilih perangkat di kiri untuk private chat</p>
                </div>
                <button onclick="resetTarget()" class="text-xs bg-slate-700 px-3 py-1 rounded hover:bg-slate-600">Reset ke Global</button>
            </div>

            <!-- Icon Picker -->
            <div class="mb-4">
                <p class="text-[10px] text-slate-500 mb-2 uppercase tracking-widest">Model Notifikasi</p>
                <div class="flex gap-2 overflow-x-auto pb-2" id="iconPicker"></div>
            </div>

            <!-- Messages -->
            <div id="chatBox" class="flex-1 overflow-y-auto mb-4 space-y-3 pr-2 border-b border-slate-700/50"></div>

            <!-- Input -->
            <div class="flex gap-2 bg-slate-900 p-2 rounded-2xl border border-slate-700">
                <input type="text" id="msgInput" placeholder="Ketik pesan..." class="flex-1 bg-transparent border-none outline-none px-3 py-2 text-sm">
                <button onclick="sendMessage()" class="bg-emerald-600 px-6 py-2 rounded-xl font-bold hover:bg-emerald-500">KIRIM</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgWhNLaeV8vE1bNLtU32JYafvxbtFXU-o",
            authDomain: "ap-shop-b4e7e.firebaseapp.com",
            projectId: "ap-shop-b4e7e",
            storageBucket: "ap-shop-b4e7e.firebasestorage.app",
            messagingSenderId: "370581375566",
            appId: "1:370581375566:web:2dace12adc2e19686a511f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messaging = getMessaging(app);
        const audio = new Audio("https://www.myinstants.com/media/sounds/love-alarm-notification.mp3");

        let myToken = "";
        let targetToken = "global";
        let selectedIcon = "https://cdn-icons-png.flaticon.com/512/3135/3135706.png";

        // Deteksi Nama Perangkat (Infinix, Samsung, Chrome, dll)
        function getDeviceName() {
            const ua = navigator.userAgent;
            if (ua.includes("Samsung")) return "Samsung Device";
            if (ua.includes("Infinix")) return "Infinix Device";
            if (ua.includes("Xiaomi")) return "Xiaomi Device";
            if (ua.includes("iPhone")) return "iPhone";
            if (ua.includes("Android")) return "Android Phone";
            return "PC/Laptop Browser";
        }

        // Setup Notif & Token
        window.setupFCM = async () => {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const token = await getToken(messaging, { 
                        vapidKey: 'hUR8IbEahVd7KHFec-tPlTzf36cmCm75L9mNK0L0NDM' 
                    });
                    
                    myToken = token;
                    const name = getDeviceName() + " (" + Math.floor(Math.random()*99) + ")";
                    
                    await setDoc(doc(db, "devices", token), {
                        name: name,
                        token: token,
                        lastSeen: serverTimestamp()
                    });
                    
                    document.getElementById('myDeviceBadge').innerText = "Online: " + name;
                    alert("Berhasil Terdaftar!");
                }
            } catch (e) { console.error(e); }
        };

        // Render Icons
        const iconList = [
            "https://cdn-icons-png.flaticon.com/512/3135/3135706.png",
            "https://cdn-icons-png.flaticon.com/512/5968/5968841.png",
            "https://cdn-icons-png.flaticon.com/512/4436/4436481.png",
            "https://cdn-icons-png.flaticon.com/512/1827/1827379.png",
            "https://cdn-icons-png.flaticon.com/512/2504/2504923.png",
            "https://cdn-icons-png.flaticon.com/512/3119/3119338.png",
            "https://cdn-icons-png.flaticon.com/512/733/733577.png",
            "https://cdn-icons-png.flaticon.com/512/1828/1828884.png",
            "https://cdn-icons-png.flaticon.com/512/1077/1077012.png",
            "https://cdn-icons-png.flaticon.com/512/9131/9131529.png"
        ];
        iconList.forEach(url => {
            const img = document.createElement('img');
            img.src = url;
            img.className = "w-8 h-8 cursor-pointer rounded border-2 border-transparent p-1 hover:bg-slate-700";
            img.onclick = () => {
                selectedIcon = url;
                document.querySelectorAll('#iconPicker img').forEach(i => i.classList.remove('border-emerald-500'));
                img.classList.add('border-emerald-500');
            };
            document.getElementById('iconPicker').appendChild(img);
        });

        // Listen Devices
        onSnapshot(collection(db, "devices"), (snap) => {
            const list = document.getElementById('deviceList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.token === myToken;
                list.innerHTML += `
                    <div onclick="window.setTarget('${d.token}', '${d.name}')" 
                         class="p-3 bg-slate-700/50 rounded-xl cursor-pointer hover:bg-slate-600 border-l-4 ${isMe ? 'border-emerald-500' : 'border-blue-500'}">
                        <p class="font-bold text-sm text-white">${d.name} ${isMe ? '(Me)' : ''}</p>
                        <p class="text-[10px] text-slate-400 truncate">${d.token.substring(0,20)}...</p>
                    </div>`;
            });
        });

        window.setTarget = (token, name) => {
            targetToken = token;
            document.getElementById('targetTitle').innerText = "Chat ke: " + name;
        };

        window.resetTarget = () => {
            targetToken = "global";
            document.getElementById('targetTitle').innerText = "Global Chat";
        };

        // Send Message
        window.sendMessage = async () => {
            const val = document.getElementById('msgInput').value;
            if(!val) return;
            await addDoc(collection(db, "messages"), {
                text: val,
                target: targetToken,
                sender: myToken,
                icon: selectedIcon,
                timestamp: serverTimestamp()
            });
            document.getElementById('msgInput').value = "";
        };

        // Listen Messages & Notif Pop-up
        const qMsg = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(qMsg, (snap) => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                if(m.target === "global" || m.target === myToken || m.sender === myToken) {
                    const isMe = m.sender === myToken;
                    box.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-fade-in">
                            <div class="${isMe ? 'bg-emerald-600' : 'bg-slate-700'} p-3 rounded-2xl max-w-[80%] shadow-md">
                                <div class="flex items-center gap-2 mb-1">
                                    <img src="${m.icon}" class="w-4 h-4">
                                    <span class="text-[10px] opacity-70">${isMe ? 'Anda' : 'Perangkat Lain'}</span>
                                </div>
                                <p class="text-sm">${m.text}</p>
                            </div>
                        </div>`;
                    
                    // Trigger Notifikasi Visual Browser jika pesan untuk kita
                    if(!isMe && m.target === myToken) {
                        new Notification("Pesan Privat Baru!", { body: m.text, icon: m.icon });
                        audio.play();
                    } else if (!isMe && m.target === "global") {
                        audio.play(); // Suara saja untuk global agar tidak spam notif
                    }
                }
            });
            box.scrollTop = box.scrollHeight;
        });

        // Foreground Listener (Saat web terbuka)
        onMessage(messaging, (payload) => {
            console.log('Message received. ', payload);
            new Notification(payload.notification.title, {
                body: payload.notification.body,
                icon: payload.notification.image
            });
        });

    </script>
</body>
</html>

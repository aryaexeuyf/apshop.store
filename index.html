<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSHOP STORE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

nav{
    background:#00ff88;
    padding:15px;
    text-align:center;
}

nav a{
    color:black;
    text-decoration:none;
    margin:10px;
    font-weight:bold;
}

.page{
    display:none;
    padding:40px;
    text-align:center;
}

.active{
    display:block;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:15px;
    max-width:500px;
    margin:auto;
}
</style>
</head>
<body>

<nav>
    <a href="#home">Home</a>
    <a href="#produk">Produk</a>
    <a href="#tentang">Tentang</a>
    <a href="#kontak">Kontak</a>
</nav>

<!-- HOME -->
<div id="home" class="page">
    <div class="box">
        <h1>🛒 APSHOP STORE</h1>
        <p>Toko gadget random paling gacor jancok 😹</p>
    </div>
</div>

<!-- PRODUK -->
<div id="produk" class="page">
    <div class="box">
        <h1>📦 Produk</h1>
        <p>🔦 Senter LED - 20rb</p>
        <p>🔊 Speaker Mini - 35rb</p>
        <p>📱 Kabel Type C - 10rb</p>
    </div>
</div>

<!-- TENTANG -->
<div id="tentang" class="page">
    <div class="box">
        <h1>👤 Tentang</h1>
        <p>APSHOP yaiku toko online isi elektronik, gadget, dll.</p>
    </div>
</div>

<!-- KONTAK -->
<div id="kontak" class="page">
    <div class="box">
        <h1>📞 Kontak</h1>
        <p>WA: 08xxxxxxxx</p>
        <p>TikTok: APSHOP</p>
    </div>
</div>

<script>
function showPage() {
    let hash = window.location.hash || "#home";

    document.querySelectorAll(".page").forEach(page=>{
        page.classList.remove("active");
    });

    let activePage = document.querySelector(hash);

    if(activePage){
        activePage.classList.add("active");
    }
}

window.addEventListener("hashchange", showPage);
window.addEventListener("load", showPage);
</script>

</body>
</html>

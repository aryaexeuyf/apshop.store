<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingkai Foto Pro - apshop.store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .canvas-container { 
            position: relative; 
            max-width: 100%; 
            border-radius: 1rem; 
            overflow: hidden; 
            background: #fff; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border: 8px solid white;
        }
        canvas { display: block; max-width: 100%; height: auto; cursor: move; }
        .slider-custom { -webkit-appearance: none; width: 100%; height: 6px; background: #cbd5e1; outline: none; border-radius: 10px; }
        .slider-custom::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; background: #2563eb; cursor: pointer; border-radius: 50%; border: 2px solid white; }
        .loader { border-top-color: #2563eb; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="text-center my-6">
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter">APSHOP PHOTO EDITOR</h1>
        <p class="text-slate-500 text-sm">Pasang bingkai otomatis & share ke WhatsApp</p>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Canvas Section -->
        <section class="lg:col-span-7 flex flex-col items-center">
            <div id="loadingStatus" class="mb-4 text-blue-600 font-bold text-sm flex items-center gap-2">
                <div class="loader w-4 h-4 border-2 border-slate-200 rounded-full"></div>
                Memuat Komponen...
            </div>
            
            <div class="canvas-container">
                <canvas id="editorCanvas"></canvas>
            </div>
        </section>

        <!-- Controls Section -->
        <section class="lg:col-span-5 space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="space-y-6">
                    
                    <!-- Upload Tool -->
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase mb-2">1. Ganti Foto Utama</label>
                        <input type="file" id="imageUpload" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
                    </div>

                    <!-- Adjustment Tools -->
                    <div class="space-y-4">
                        <label class="block text-xs font-black text-slate-400 uppercase">2. Sesuaikan Posisi</label>
                        
                        <div>
                            <div class="flex justify-between text-xs font-bold text-slate-600 mb-1">
                                <span>Zoom</span>
                                <span id="zoomVal">100%</span>
                            </div>
                            <input type="range" id="zoomSlider" min="0.1" max="3" step="0.01" value="1" class="slider-custom">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Geser Kiri-Kanan</label>
                                <input type="range" id="posXSlider" min="-500" max="500" value="0" class="slider-custom">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Geser Atas-Bawah</label>
                                <input type="range" id="posYSlider" min="-500" max="500" value="0" class="slider-custom">
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 space-y-3">
                        <button id="saveBtn" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-slate-900 transition-all flex items-center justify-center gap-2">
                            Download ke HP
                        </button>
                        
                        <button id="shareWaBtn" class="w-full py-3 bg-green-500 text-white rounded-xl font-bold text-sm hover:bg-green-600 transition-all flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            Upload & Share ke WA
                        </button>
                    </div>

                    <button id="resetBtn" class="w-full py-2 text-slate-400 text-[10px] font-bold uppercase hover:text-slate-600">Reset Edit</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Uploading Modal -->
    <div id="uploadingModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl max-w-xs w-full text-center shadow-2xl">
            <div class="loader w-10 h-10 border-4 border-slate-200 rounded-full mx-auto mb-4"></div>
            <h4 class="font-bold text-slate-800">Sedang Memproses...</h4>
            <p class="text-slate-500 text-xs mt-2">Gambar sedang diupload ke server untuk dibagikan.</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const imageUpload = document.getElementById('imageUpload');
        const zoomSlider = document.getElementById('zoomSlider');
        const posXSlider = document.getElementById('posXSlider');
        const posYSlider = document.getElementById('posYSlider');
        const saveBtn = document.getElementById('saveBtn');
        const shareWaBtn = document.getElementById('shareWaBtn');
        const resetBtn = document.getElementById('resetBtn');
        const zoomValDisplay = document.getElementById('zoomVal');
        const loadingStatus = document.getElementById('loadingStatus');
        const uploadingModal = document.getElementById('uploadingModal');

        // Config
        const IMGBB_API_KEY = "d02d2df934f4acf71e27765a0bfa2312";
        const frameUrl = "https://raw.githubusercontent.com/aryaexeuyf/Image/main/ChatGPT%20Image%2013%20Mei%202026%2C%2022.38.22.png";
        const defaultUserImgUrl = "https://raw.githubusercontent.com/aryaexeuyf/Image/main/Gemini_Generated_Image_ap731bap731bap73.png";

        let frameImg = new Image();
        let userImg = new Image();
        
        let config = { scale: 1, x: 0, y: 0 };

        async function init() {
            frameImg.crossOrigin = "anonymous";
            userImg.crossOrigin = "anonymous";

            const urlParams = new URLSearchParams(window.location.search);
            const sharedImg = urlParams.get('img');

            frameImg.src = frameUrl;
            userImg.src = sharedImg ? decodeURIComponent(sharedImg) : defaultUserImgUrl;

            let loadedCount = 0;
            const onLoaded = () => {
                loadedCount++;
                if (loadedCount === 2) {
                    loadingStatus.classList.add('hidden');
                    setupCanvas();
                    draw();
                }
            };

            frameImg.onload = onLoaded;
            userImg.onload = onLoaded;

            frameImg.onerror = () => { loadingStatus.innerText = "Error: Bingkai gagal dimuat."; };
            userImg.onerror = () => { 
                userImg.src = defaultUserImgUrl; // Fallback
            };
        }

        function setupCanvas() {
            canvas.width = 1080; // High resolution
            canvas.height = 1080;
            
            const range = 1500;
            posXSlider.min = -range;
            posXSlider.max = range;
            posYSlider.min = -range;
            posYSlider.max = range;
            
            resetTransform();
        }

        function resetTransform() {
            const ratio = Math.max(canvas.width / userImg.width, canvas.height / userImg.height);
            config.scale = ratio;
            config.x = (canvas.width - userImg.width * ratio) / 2;
            config.y = (canvas.height - userImg.height * ratio) / 2;
            updateUI();
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Layer 1: User Photo
            ctx.drawImage(userImg, config.x, config.y, userImg.width * config.scale, userImg.height * config.scale);
            // Layer 2: Frame
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }

        function updateUI() {
            zoomSlider.value = config.scale;
            posXSlider.value = config.x;
            posYSlider.value = config.y;
            zoomValDisplay.innerText = Math.round(config.scale * 100) + "%";
        }

        zoomSlider.oninput = (e) => { config.scale = parseFloat(e.target.value); updateUI(); draw(); };
        posXSlider.oninput = (e) => { config.x = parseInt(e.target.value); draw(); };
        posYSlider.oninput = (e) => { config.y = parseInt(e.target.value); draw(); };

        imageUpload.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => { userImg = img; resetTransform(); };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        saveBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `APShop_Edit_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        };

        shareWaBtn.onclick = async () => {
            uploadingModal.classList.remove('hidden');
            
            try {
                // 1. Convert Canvas to Base64 (Tanpa Header)
                const dataBase64 = canvas.toDataURL("image/png", 0.8).split(',')[1];
                
                // 2. Prepare Form Data
                const formData = new FormData();
                formData.append("image", dataBase64);

                // 3. Post to ImgBB
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    const imgUrl = result.data.url;
                    
                    // Gunakan URL Github Pages kamu secara otomatis
                    const currentUrl = window.location.origin + window.location.pathname;
                    const shareUrl = `${currentUrl}?img=${encodeURIComponent(imgUrl)}`;
                    
                    const waText = `Halo! Lihat foto keren aku pake bingkai dari APSHOP ini:%0A%0A${shareUrl}`;
                    
                    window.open(`https://wa.me/?text=${waText}`, '_blank');
                } else {
                    console.error("Upload Error:", result);
                    alert("Gagal mengunggah ke Cloud. Cek koneksi atau API Key.");
                }
            } catch (err) {
                console.error("Critical Error:", err);
                alert("Terjadi kesalahan sistem saat memproses gambar.");
            } finally {
                uploadingModal.classList.add('hidden');
            }
        };

        resetBtn.onclick = resetTransform;
        window.onload = init;
    </script>
</body>
</html>
